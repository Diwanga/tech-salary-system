apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techsalary-ingress
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: techsalary.local
      http:
        paths:
          # BFF — forward /api/* as-is, no rewrite
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bff
                port:
                  number: 3000
          # Frontend — everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80