version: "3.9"

services:
  # This file for initial dev testing
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: techsalary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       techsalary
      POSTGRES_USER:     techsalary
      POSTGRES_PASSWORD: techsalary_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techsalary -d techsalary"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - techsalary-net

  # ── Salary Service ─────────────────────────────────────────
  salary-service:
    build:
      context: ./salary-service
      dockerfile: Dockerfile
    container_name: techsalary-salary-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_URL:                  jdbc:postgresql://postgres:5432/techsalary
      DB_USER:                 techsalary
      DB_PASSWORD:             techsalary_pass
      INTERNAL_SERVICE_TOKEN:  internal-secret-token-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - techsalary-net

  # ── Stats Service (Express.js) ─────────────────────────────
  stats-service:
    build:
      context: ./stats-service
      dockerfile: Dockerfile
    container_name: techsalary-stats-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      PORT:        8085
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     techsalary
      DB_USER:     techsalary
      DB_PASSWORD: techsalary_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - techsalary-net

  # ── pgAdmin ────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: techsalary-pgadmin
    restart: unless-stopped
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@techsalary.lk
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - techsalary-net

volumes:
  postgres_data:
    name: techsalary-postgres-data
  pgadmin_data:
    name: techsalary-pgadmin-data

networks:
  techsalary-net:
    name: techsalary-network
    driver: bridge
