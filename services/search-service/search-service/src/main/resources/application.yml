# ============================================================
# Search Service Configuration
# ============================================================

server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: search-service

  # ----- Database Configuration -----
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/salary_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  # ----- JPA Configuration -----
  jpa:
    hibernate:
      ddl-auto: none          # Schema is managed by SQL scripts
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# ----- Application Configuration -----
app:
  default-currency: ${DEFAULT_CURRENCY:LKR}
  vote-threshold: ${VOTE_THRESHOLD:5}
  search:
    default-page-size: ${DEFAULT_PAGE_SIZE:20}
    max-page-size: ${MAX_PAGE_SIZE:100}

# ----- Actuator Configuration -----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ----- Logging -----
logging:
  level:
    com.techsalary.search: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
